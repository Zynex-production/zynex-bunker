<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNEX BUNKER 1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body { 
            background-color: #0D0D0D; 
            color: #7B2CBF; 
            font-family: 'Share Tech Mono', monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .panel { 
            background-color: #1A1A1A; 
            border: 1px solid #7B2CBF; 
            border-radius: 5px; 
            padding: 20px; 
            width: 90%; 
            max-width: 450px; 
            box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); 
            margin-bottom: 20px; 
        }

        .access-granted { border-color: #00ff41; color: #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        h2 { margin-top: 0; border-bottom: 1px solid currentColor; padding-bottom: 10px; text-align: center; }

        button { 
            background: none; 
            color: inherit; 
            border: 1px solid currentColor; 
            padding: 12px; 
            width: 100%; 
            margin-top: 15px; 
            font-family: inherit; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        button:hover { background: rgba(123, 44, 191, 0.1); }
        
        /* Чат стили */
        #chat-container {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            margin: 15px 0;
            background: #050505;
            font-size: 13px;
        }
        .user-msg { color: #7B2CBF; margin-bottom: 8px; }
        .ai-msg { color: #00ff41; margin-bottom: 8px; }
        
        input[type="text"] {
            width: calc(100% - 22px);
            background: #1A1A1A;
            border: 1px solid #7B2CBF;
            color: #7B2CBF;
            padding: 10px;
            font-family: inherit;
            outline: none;
        }

        #loader { font-size: 18px; animation: blink 1s infinite; margin: 20px 0; text-align: center; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="panel" id="main-panel">
        <h2>[ ZYNEX BUNKER 1.0 ]</h2>
        <div id="loader">ИНИЦИАЛИЗАЦИЯ СИСТЕМЫ...</div>

        <div id="app-content" class="hidden">
            <p>> ПОЛЬЗОВАТЕЛЬ: <span id="username">---</span></p>
            <p>> СТАТУС: <span id="role">---</span></p>
            
            <hr style="border: 0.5px solid #333; margin: 20px 0;">

            <div id="ai-section">
                <h3 style="margin:0">>_ ЯДРО ИИ ZYNEX</h3>
                <div id="chat-container">
                    <div class="ai-msg">[SYSTEM]: Ожидаю голосовой или текстовый ввод...</div>
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="ai-input" placeholder="Введите команду...">
                    <button id="send-btn" onclick="askAI()" style="width: auto; margin-top:0;">[>]</button>
                </div>
            </div>

            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            
            <div id="storage-module">
                <button onclick="document.getElementById('file-input').click()">[ ЗАГРУЗИТЬ ДАННЫЕ В БУНКЕР ]</button>
                <input type="file" id="file-input" style="display:none">
            </div>

            <div id="admin-module" class="hidden">
                <button onclick="alert('NUCLEAR LOCK ACTIVATED')" style="color:#ff003c; border-color:#ff003c; margin-top:20px;">
                    [ NUCLEAR LOCK ]
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://hcleqoqfphjfpfrbkddl.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Puql0xQZgDAzZLA_hgOa6A_Q4UbP1qd';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ВАЖНО: Получи свой ключ на https://console.groq.com/
        const AI_API_KEY = 'ВСТАВЬ_СВОЙ_КЛЮЧ_GROQ_ЗДЕСЬ'; 

        let currentUserId = 6538403307;

        async function startSystem() {
            const tgUser = tg.initDataUnsafe?.user;
            if (tgUser) currentUserId = tgUser.id;

            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('telegram_id', currentUserId)
                .single();

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');

            if (data) {
                document.getElementById('username').innerText = data.username || "Director";
                document.getElementById('role').innerText = data.role;
                document.getElementById('main-panel').classList.add('access-granted');
                if (data.role === 'SUPER_ADMIN') {
                    document.getElementById('admin-module').classList.remove('hidden');
                }
            }
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const chat = document.getElementById('chat-container');
            const text = input.value.trim();

            if (!text) return;

            // 1. Отображаем сообщение юзера
            chat.innerHTML += `<div class="user-msg">[YOU]: ${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // 2. Индикатор загрузки
            const tempId = 'ai-temp-' + Date.now();
            chat.innerHTML += `<div class="ai-msg" id="${tempId}">[AI]: Обработка...</div>`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AI_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: text}]
                    })
                });

                const resData = await response.json();
                const aiResponse = resData.choices[0].message.content;

                // 3. Заменяем "Обработка" на ответ
                document.getElementById(tempId).innerText = `[AI]: ${aiResponse}`;

                // 4. Сохраняем в Supabase
                await supabaseClient.from('ai_chats').insert([
                    { telegram_id: currentUserId, role: 'user', content: text },
                    { telegram_id: currentUserId, role: 'assistant', content: aiResponse }
                ]);

            } catch (err) {
                document.getElementById(tempId).innerText = "[AI]: ОШИБКА СВЯЗИ. ПРОВЕРЬТЕ API KEY.";
            }
            chat.scrollTop = chat.scrollHeight;
        }

        startSystem();
    </script>
</body>
</html>
