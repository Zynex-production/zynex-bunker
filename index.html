<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZYNEX TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #000; color: #7B2CBF; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .terminal { border: 1px solid #7B2CBF; flex: 1; display: flex; flex-direction: column; padding: 10px; box-shadow: 0 0 10px #7B2CBF; }
        #output { flex: 1; overflow-y: auto; margin-bottom: 10px; font-size: 14px; white-space: pre-wrap; }
        .input-line { display: flex; gap: 10px; border-top: 1px solid #333; padding-top: 10px; }
        input { flex: 1; background: transparent; border: 1px solid #7B2CBF; color: #7B2CBF; padding: 8px; font-family: inherit; outline: none; }
        button { background: #7B2CBF; color: #000; border: none; padding: 0 15px; cursor: pointer; font-family: inherit; font-weight: bold; }
        .system { color: #555; }
        .ai { color: #00ff41; }
        .error { color: #ff003c; }
    </style>
</head>
<body>
    <div class="terminal">
        <div id="output"><span class="system">> SYSTEM BOOT... READY.</span></div>
        <div class="input-line">
            <input type="text" id="cmd" placeholder="ВВЕДИТЕ КОМАНДУ..." autocomplete="off">
            <button onclick="send()">EXEC</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

      const client = supabase.createClient(
    'https://hcleqoqfphjfpfrbkddl.supabase.co', // Твой ID проекта
    'sb_publishable_Puql0xQZgDAzZLA_hgOa6A_Q4UbP1qd' // Твой публичный ключ
);

        const out = document.getElementById('output');
        const inp = document.getElementById('cmd');

        function print(text, cls = '') {
            const div = document.createElement('div');
            div.className = cls;
            div.innerText = text;
            out.appendChild(div);
            out.scrollTop = out.scrollHeight;
        }

        async function send() {
            const val = inp.value.trim();
            if (!val) return;

            print(`\n[USER]: ${val}`);
            inp.value = '';
            
            const loading = document.createElement('span');
            loading.innerText = "> ОБРАБОТКА...";
            out.appendChild(loading);

            try {
                const { data, error } = await client.functions.invoke('zynex-ai', {
                    body: { prompt: val }
                });

                loading.remove();

                if (error) {
                    print(`> ОШИБКА: ${error.message || 'Связь прервана'}`, 'error');
                } else {
                    print(`[ZYNEX]: ${data.choices[0].message.content}`, 'ai');
                }
            } catch (e) {
                loading.remove();
                print(`> КРИТИЧЕСКИЙ СБОЙ: Проверь статус Deploy`, 'error');
            }
        }

        inp.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
