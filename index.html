<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYNEX BUNKER 1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body { 
            background-color: #0D0D0D; 
            color: #7B2CBF; 
            font-family: 'Share Tech Mono', monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .panel { 
            background-color: #1A1A1A; 
            border: 1px solid #7B2CBF; 
            border-radius: 5px; 
            padding: 20px; 
            width: 90%; 
            max-width: 450px; 
            box-shadow: 0 0 15px rgba(123, 44, 191, 0.3); 
            margin-bottom: 20px; 
        }

        .access-granted { border-color: #00ff41; color: #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        h2 { margin-top: 0; border-bottom: 1px solid currentColor; padding-bottom: 10px; text-align: center; }

        button { 
            background: none; 
            color: inherit; 
            border: 1px solid currentColor; 
            padding: 12px; 
            width: 100%; 
            margin-top: 15px; 
            font-family: inherit; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: rgba(123, 44, 191, 0.1); }
        
        /* ЧАТ ТЕРМИНАЛ */
        #chat-container {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
            margin: 15px 0;
            background: #050505;
            font-size: 13px;
            scrollbar-width: thin;
            scrollbar-color: #7B2CBF #050505;
        }
        .user-msg { color: #7B2CBF; margin-bottom: 10px; border-left: 2px solid #7B2CBF; padding-left: 5px; }
        .ai-msg { color: #00ff41; margin-bottom: 10px; border-left: 2px solid #00ff41; padding-left: 5px; }
        
        .input-group { display: flex; gap: 5px; }
        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #7B2CBF;
            color: #7B2CBF;
            padding: 10px;
            font-family: inherit;
            outline: none;
        }

        #loader { font-size: 18px; animation: blink 1s infinite; margin: 20px 0; text-align: center; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="panel" id="main-panel">
        <h2>[ ZYNEX BUNKER 1.0 ]</h2>
        <div id="loader">ПРОВЕРКА ШИФРОВАНИЯ...</div>

        <div id="app-content" class="hidden">
            <p>> ПОЛЬЗОВАТЕЛЬ: <span id="username">---</span></p>
            <p>> СТАТУС: <span id="role">---</span></p>
            
            <hr style="border: 0.5px solid #333; margin: 15px 0;">

            <div id="ai-module">
                <h3 style="margin:0; font-size: 14px; color: #00ff41;">>_ ZYNEX_AI_CORE (SECURE)</h3>
                <div id="chat-container">
                    <div class="ai-msg">[SYSTEM]: Канал связи защищен. Ожидаю ввод...</div>
                </div>
                <div class="input-group">
                    <input type="text" id="ai-input" placeholder="Команда для ИИ..." onkeypress="if(event.key==='Enter') askAI()">
                    <button onclick="askAI()" style="width: 50px; margin-top:0;">></button>
                </div>
            </div>

            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            
            <button onclick="document.getElementById('file-input').click()">[ ЗАГРУЗИТЬ ДАННЫЕ ]</button>
            <input type="file" id="file-input" style="display:none">

            <div id="admin-module" class="hidden">
                <button onclick="alert('NUCLEAR LOCK: АКТИВИРОВАНО')" style="color:#ff003c; border-color:#ff003c;">
                    [ NUCLEAR LOCK ]
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Конфигурация Supabase
        const SUPABASE_URL = 'https://hcleqoqfphjfpfrbkddl.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_Puql0xQZgDAzZLA_hgOa6A_Q4UbP1qd';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUserId = 6538403307;

        async function startSystem() {
            const tgUser = tg.initDataUnsafe?.user;
            if (tgUser) currentUserId = tgUser.id;

            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('telegram_id', currentUserId)
                .single();

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');

            if (data) {
                document.getElementById('username').innerText = data.username || "Director";
                document.getElementById('role').innerText = data.role;
                document.getElementById('main-panel').classList.add('access-granted');
                if (data.role === 'SUPER_ADMIN') {
                    document.getElementById('admin-module').classList.remove('hidden');
                }
            }
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const chat = document.getElementById('chat-container');
            const query = input.value.trim();

            if (!query) return;

            chat.innerHTML += `<div class="user-msg">[USER]: ${query}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            const aiMsgId = 'ai-' + Date.now();
            chat.innerHTML += `<div class="ai-msg" id="${aiMsgId}">[AI]: Анализ через Edge Function...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                // ВЫЗОВ ЗАЩИЩЕННОЙ ФУНКЦИИ SUPABASE
                const { data, error } = await supabaseClient.functions.invoke('zynex-ai', {
                    body: { prompt: query }
                });

                if (error) throw error;

                const reply = data.choices[0].message.content;
                document.getElementById(aiMsgId).innerText = `[AI]: ${reply}`;

                // Сохранение в БД
                await supabaseClient.from('ai_chats').insert([
                    { telegram_id: currentUserId, role: 'user', content: query },
                    { telegram_id: currentUserId, role: 'assistant', content: reply }
                ]);

            } catch (err) {
                console.error('AI Error:', err);
                document.getElementById(aiMsgId).innerText = "[ОШИБКА]: Доступ к ИИ отклонен или функция не развернута.";
                document.getElementById(aiMsgId).style.color = "#ff003c";
            }
            chat.scrollTop = chat.scrollHeight;
        }

        startSystem();
    </script>
</body>
</html>
